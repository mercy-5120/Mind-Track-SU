<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Login - MindTrackSU</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <!-- HEADER SECTION -->
    <header class="header">
      <div class="container">
        <a class="brand" href="../user/landing page.html#home">
          <img src="../../Logo.png" alt="MindTrackSU Logo" class="logo" />
        </a>

        <nav class="nav" aria-label="Primary navigation">
          <a href="../user/landing page.html#home">Home</a>
          <a href="../user/landing page.html#about">About</a>
          <a href="../user/landing page.html#support">Resources</a>
          <a href="../user/login.html">Login</a>
        </nav>

        <button
          class="menu-toggle"
          aria-expanded="false"
          aria-controls="mobile-nav"
          type="button"
        >
          <span class="menu-line"></span>
          <span class="menu-line"></span>
          <span class="menu-line"></span>
        </button>
      </div>

      <nav
        id="mobile-nav"
        class="mobile-nav hidden"
        aria-label="Mobile navigation"
      >
        <a href="../user/landing page.html#home">Home</a>
        <a href="../user/landing page.html#about">About</a>
        <a href="../user/landing page.html#support">Resources</a>
        <a href="../user/login.html">Login</a>
      </nav>
    </header>

    <!-- STAFF LOGIN SECTION -->
    <section id="staff-login" class="auth-page">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <img src="../../Logo.png" alt="MindTrackSU Logo" class="auth-logo" />
            <h1>Staff Login</h1>
            <p>Access your staff dashboard</p>
          </div>

          <form class="auth-form" action="dashboard.html" method="GET">
            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="staff@example.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>

            <a href="../user/forgot-password.html" class="forgot-link"
              >Forgot password?</a
            >

            <button type="submit" class="btn btn-primary btn-full">
              Log In as Staff
            </button>
          </form>

          <div class="auth-divider">
            <span>or</span>
          </div>

          <div class="auth-links">
            <p>gi
              Are you a student?
              <a href="../user/login.html" class="link-primary">Student login</a>
            </p>
          </div>
        </div>
      </div>
    </section>

    <script>
  document.querySelector(".auth-form").addEventListener("submit", function() {
    sessionStorage.setItem('staffRole', 'sumc');
  });
</script>
  </body>
</html>
