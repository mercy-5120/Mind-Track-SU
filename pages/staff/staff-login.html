<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Login - MindTrackSU</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <!-- HEADER SECTION -->
    <header class="header">
      <div class="container">
        <a class="brand" href="landing page.html">
          <img src="../../Logo.png" alt="MindTrackSU Logo" class="logo" />
        </a>
      </div>
    </header>

    <!-- STAFF LOGIN SECTION -->
    <section id="staff-login" class="auth-page">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <!-- Logo added here -->
            <img src="../../Logo.png" alt="MindTrackSU Logo" class="auth-logo" />
            <h1>Staff Login</h1>
            <p>Access your staff dashboard</p>
          </div>

          <form class="auth-form" action="dashboard.html" method="GET">
            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="staff@example.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>

            <a href="forgot-password.html" class="forgot-link"
              >Forgot password?</a
            >

            <button type="submit" class="btn btn-primary btn-full">
              Log In as Staff
            </button>
          </form>

          <div class="auth-divider">
            <span>or</span>
          </div>

          <div class="auth-links">
            <p>
              Are you a student?
              <a href="/pages/user/login.html" class="link-primary">Student login</a>
            </p>
          </div>
        </div>
      </div>
    </section>

    <script>
  document.querySelector(".auth-form").addEventListener("submit", function() {
    sessionStorage.setItem('staffRole', 'sumc');
  });
</script>
  </body>
</html>
