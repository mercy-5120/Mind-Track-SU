<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - MindTrackSU</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <!-- HEADER SECTION -->
    <header class="header">
      <div class="container">
        <a class="brand" href="landing page.html">
          <img src="../../Logo.png" alt="MindTrackSU Logo" class="logo" />
        </a>
      </div>
    </header>

    <!-- FORGOT PASSWORD SECTION -->
    <section id="forgot-password" class="auth-page">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <img src="../../Logo.png" alt="MindTrackSU Logo" class="auth-logo" />
            <h1>Reset Password</h1>
            <p>
              Enter your email and we'll send you a link to reset your password
            </p>
          </div>

          <form class="auth-form">
            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary btn-full">
              Send Reset Link
            </button>
          </form>

          <div class="auth-divider">
            <span>or</span>
          </div>

          <div class="auth-links">
            <p>
              Remember your password?
              <a href="login.html" class="link-primary">Log in here</a>
            </p>
          </div>
        </div>
      </div>
    </section>

    <script>
      const form = document.querySelector(".auth-form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        console.log("Password reset requested for:", email);
        alert("Check your email for password reset link");
      });
    </script>
  </body>
</html>
