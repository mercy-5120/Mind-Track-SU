<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - MindTrackSU</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <!-- HEADER SECTION -->
    <header class="header">
      <div class="container">
        <a class="brand" href="landing page.html#home">
          <img src="../../Logo.png" alt="MindTrackSU Logo" class="logo" />
        </a>

        <nav class="nav" aria-label="Primary navigation">
          <a href="landing page.html#home">Home</a>
          <a href="landing page.html#about">About</a>
          <a href="landing page.html#support">Resources</a>
          <a href="login.html">Login</a>
        </nav>

        <button
          class="menu-toggle"
          aria-expanded="false"
          aria-controls="mobile-nav"
          type="button"
        >
          <span class="menu-line"></span>
          <span class="menu-line"></span>
          <span class="menu-line"></span>
        </button>
      </div>

      <nav
        id="mobile-nav"
        class="mobile-nav hidden"
        aria-label="Mobile navigation"
      >
        <a href="landing page.html#home">Home</a>
        <a href="landing page.html#about">About</a>
        <a href="landing page.html#support">Resources</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <!-- SIGNUP SECTION -->
    <section id="signup" class="auth-page">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <img src="../../Logo.png" alt="MindTrackSU Logo" class="auth-logo" />
            <h1>Create Account</h1>
            <p>Start your anonymous mental health journey</p>
          </div>

          <form class="auth-form">
            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="form-group">
              <label for="confirm-password">Confirm Password</label>
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary btn-full">
              Create Account
            </button>
          </form>

          <div class="auth-divider">
            <span>or</span>
          </div>

          <div class="auth-links">
            <p>
              Already have an account?
              <a href="login.html" class="link-primary">Log in here</a>
            </p>
          </div>
        </div>
      </div>
    </section>

    <script>
      const form = document.querySelector(".auth-form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirm-password").value;
        if (password !== confirmPassword) {
          alert("Passwords do not match");
          return;
        }
        console.log("Signup attempt:", { email, password });
      });
    </script>
  </body>
</html>
